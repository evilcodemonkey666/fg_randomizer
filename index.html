<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl Randomizer</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #e74c3c;
            --text-color: #f5f5f5;
            --border-color: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 { color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Results Styling */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            text-align: center;
        }

        .result-card {
            background: #111;
            padding: 15px;
            border: 1px solid var(--accent-color);
            border-radius: 5px;
        }

        .result-label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .result-value { font-size: 1.2rem; font-weight: bold; color: var(--accent-color); }

        /* Configuration Styling */
        .film-toggles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .film-item { display: flex; align-items: center; font-size: 0.9rem; cursor: pointer; }
        .film-item input { margin-right: 10px; accent-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button.secondary { background: #555; margin-top: 10px; }

        .editor-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] {
            flex-grow: 1;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        .list-manager { max-height: 200px; overflow-y: auto; margin-top: 10px; border: 1px solid var(--border-color); padding: 5px; }
        .list-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .remove-btn { color: var(--accent-color); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Final Girl Randomizer</h1>

    <!-- RANDOMIZER ACTION -->
    <div class="section">
        <button id="randomizeBtn">GENERATE HORROR SCENARIO</button>
        <div class="results-grid" style="margin-top: 20px;">
            <div class="result-card">
                <div class="result-label">Killer</div>
                <div id="resKiller" class="result-value">?</div>
            </div>
            <div class="result-card">
                <div class="result-label">Location</div>
                <div id="resLocation" class="result-value">?</div>
            </div>
            <div class="result-card">
                <div class="result-label">Final Girl</div>
                <div id="resGirl" class="result-value">?</div>
            </div>
        </div>
    </div>

    <!-- FEATURE FILM SELECTION -->
    <div class="section">
        <h3>Feature Films Owned</h3>
        <div class="film-toggles" id="filmToggles">
            <!-- Dynamic checkboxes here -->
        </div>
        <div style="margin-top: 15px;">
            <button class="secondary" onclick="toggleAll(true)">Select All</button>
            <button class="secondary" onclick="toggleAll(false)">Deselect All</button>
        </div>
    </div>

    <!-- LIST MANAGEMENT -->
    <div class="section">
        <h3>Manage Lists</h3>
        <p style="font-size: 0.8rem; color: #888;">Add custom items (killers, locations, or girls) to the master pool.</p>
        
        <div class="editor-row">
            <input type="text" id="customInput" placeholder="Item name...">
            <select id="typeSelect">
                <option value="killers">Killer</option>
                <option value="locations">Location</option>
                <option value="girls">Final Girl</option>
            </select>
            <button style="width: auto;" onclick="addCustomItem()">Add</button>
        </div>

        <div class="list-manager" id="masterList">
            <!-- Master list for deletion -->
        </div>
    </div>
</div>

<script>
    // Initial data for the app
    const defaultData = {
        films: [
            { id: "s1_hans", name: "The Happy Trails Horror", killers: ["Hans"], locations: ["Camp Happy Trails"], girls: ["Laurie", "Reiko"] },
            { id: "s1_poltergeist", name: "The Haunting of Creech Manor", killers: ["The Poltergeist"], locations: ["Creech Manor"], girls: ["Alice", "Selena"] },
            { id: "s1_ink", name: "Slaughter in the Groves", killers: ["Inkanyamba"], locations: ["Sacred Groves"], girls: ["Adelaide", "Barbara"] },
            { id: "s1_gepetto", name: "Carnage at the Carnival", killers: ["Geppetto"], locations: ["Carnival of Blood"], girls: ["Asami", "Charlie"] },
            { id: "s1_fright", name: "Frightmare on Maple Lane", killers: ["Dr. Fright"], locations: ["Maple Lane"], girls: ["Nancy", "Sheila"] },
            { id: "s2_evo", name: "Into the Void", killers: ["The Evomorph"], locations: ["USS Konrad"], girls: ["Ellen", "Jeanette"] },
            { id: "s2_org", name: "Panic at Station 2891", killers: ["The Organism"], locations: ["Station 2891"], girls: ["Kate", "Moriko"] },
            { id: "s2_intruders", name: "A Knock at the Door", killers: ["The Intruders"], locations: ["Wingard Cottage"], girls: ["Ginny", "Ava"] },
            { id: "s2_wolf", name: "Once Upon a Full Moon", killers: ["Big Bad Wolf"], locations: ["Storybook Woods"], girls: ["Red", "Gretel"] },
            { id: "s2_ratchet", name: "Madness in the Dark", killers: ["The Ratchet Lady"], locations: ["Wolfe Asylum"], girls: ["Heather", "Veronica"] },
            { id: "s3_hunter", name: "The Killer from Tomorrow", killers: ["The H.U.N.T.E.R."], locations: ["Sunnydaze Mall"], girls: ["Kat", "Tali"] },
            { id: "s3_razor", name: "Hell to Pay", killers: ["Razorface"], locations: ["Hellscape"], girls: ["Christie", "Kenzie"] },
            { id: "s3_slayer", name: "The Falconwood Files", killers: ["Slayer"], locations: ["Falconwood"], girls: ["Octavia", "Janelle"] },
            { id: "s3_tormentor", name: "The Marrek Murders", killers: ["The Tormentor"], locations: ["Marrek Warehouse"], girls: ["Mandy", "Cassie"] },
            { id: "s3_eyeless", name: "Don't Make a Sound", killers: ["The Eyeless"], locations: ["Utopia"], girls: ["Meghan", "Ronda"] },
            { id: "sp_krampus", name: "North Pole Nightmare", killers: ["Krampus"], locations: ["Santa's Village"], girls: ["Mrs. Claus", "Cindy"] },
            { id: "v_birds", name: "Terror from Above", killers: ["The Birds"], locations: [], girls: ["Melanie"] },
            { id: "v_zombies", name: "Terror from the Grave", killers: ["Zombies"], locations: [], girls: [] },
            { id: "v_destiny", name: "Terror From Destiny", killers: ["Destiny"], locations: [], girls: [] },
            { id: "extras", name: "Guest Stars / Promos", killers: [], locations: [], girls: ["Paula", "Agnes", "Layla", "Jamie", "Carolyn's Revenge", "Grandma's Grudge"] }
        ],
        custom: { killers: [], locations: [], girls: [] }
    };

    let state = JSON.parse(localStorage.getItem('fg_randomizer_state')) || {
        ownedFilms: defaultData.films.map(f => f.id),
        custom: defaultData.custom
    };

    function saveState() {
        localStorage.setItem('fg_randomizer_state', JSON.stringify(state));
    }

    // UI Rendering
    function renderFilms() {
        const container = document.getElementById('filmToggles');
        container.innerHTML = '';
        defaultData.films.forEach(film => {
            const label = document.createElement('label');
            label.className = 'film-item';
            const checked = state.ownedFilms.includes(film.id) ? 'checked' : '';
            label.innerHTML = `<input type="checkbox" value="${film.id}" ${checked}> ${film.name}`;
            label.querySelector('input').addEventListener('change', (e) => {
                if(e.target.checked) state.ownedFilms.push(film.id);
                else state.ownedFilms = state.ownedFilms.filter(id => id !== film.id);
                saveState();
            });
            container.appendChild(label);
        });
    }

    function renderMasterList() {
        const container = document.getElementById('masterList');
        container.innerHTML = '';
        ['killers', 'locations', 'girls'].forEach(type => {
            state.custom[type].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>[${type.toUpperCase()}] ${item}</span> <span class="remove-btn" onclick="removeCustom('${type}', ${index})">REMOVE</span>`;
                container.appendChild(div);
            });
        });
    }

    // Logic
    function toggleAll(val) {
        state.ownedFilms = val ? defaultData.films.map(f => f.id) : [];
        renderFilms();
        saveState();
    }

    function addCustomItem() {
        const name = document.getElementById('customInput').value.trim();
        const type = document.getElementById('typeSelect').value;
        if (!name) return;
        state.custom[type].push(name);
        document.getElementById('customInput').value = '';
        renderMasterList();
        saveState();
    }

    function removeCustom(type, index) {
        state.custom[type].splice(index, 1);
        renderMasterList();
        saveState();
    }

    function randomize() {
        const activeFilms = defaultData.films.filter(f => state.ownedFilms.includes(f.id));
        
        let poolKillers = [...state.custom.killers];
        let poolLocations = [...state.custom.locations];
        let poolGirls = [...state.custom.girls];

        activeFilms.forEach(f => {
            poolKillers.push(...f.killers);
            poolLocations.push(...f.locations);
            poolGirls.push(...f.girls);
        });

        const pick = (arr) => arr.length ? arr[Math.floor(Math.random() * arr.length)] : "None Available";

        document.getElementById('resKiller').innerText = pick(poolKillers);
        document.getElementById('resLocation').innerText = pick(poolLocations);
        document.getElementById('resGirl').innerText = pick(poolGirls);
        
        // Visual feedback
        const cards = document.querySelectorAll('.result-card');
        cards.forEach(c => {
            c.style.transform = "scale(1.05)";
            setTimeout(() => c.style.transform = "scale(1)", 200);
        });
    }

    // Init
    document.getElementById('randomizeBtn').addEventListener('click', randomize);
    renderFilms();
    renderMasterList();
</script>

</body>
</html>
