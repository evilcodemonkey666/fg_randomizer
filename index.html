<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8b0000; --bright: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        h1 { font-family: 'Nosifer', cursive; color: var(--blood); text-align: center; margin: 20px 0; font-size: clamp(1.8rem, 5vw, 2.8rem); text-shadow: 3px 3px 0px #000; }

        /* Global Controls */
        .global-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-sm { background: #222; color: #aaa; border: 1px solid #444; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .btn-sm:hover { border-color: var(--bright); color: white; }

        /* Results */
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); border: 2px solid var(--blood); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative; }
        .card i { font-size: 2.2rem; display: block; margin-bottom: 10px; opacity: 0.8; }
        .val { font-size: 1.6rem; font-weight: 900; color: var(--bright); margin: 5px 0; min-height: 1.9rem; }
        .origin { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; font-weight: bold; min-height: 1rem; }

        /* Main Button */
        #roll-btn { background: var(--blood); color: white; border: none; width: 100%; padding: 20px; font-size: 1.6rem; font-weight: 900; border-radius: 8px; cursor: pointer; margin-bottom: 30px; letter-spacing: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        #roll-btn:hover { background: var(--bright); transform: translateY(-2px); }

        /* Expansion Sections */
        details { background: var(--card); border: 1px solid #222; margin-bottom: 8px; border-radius: 6px; }
        summary { padding: 15px; cursor: pointer; font-weight: 900; display: flex; align-items: center; background: #222; border-radius: 6px; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        .summary-content { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-left: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 15px; background: #111; border-top: 1px solid #333; }
        .item { display: flex; align-items: center; font-size: 0.85rem; background: #1a1a1a; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .item:hover { border-color: #444; background: #222; }
        .item input { margin-right: 12px; transform: scale(1.2); accent-color: var(--bright); }
    </style>
</head>
<body>

<div class="container">
    <h1>FINAL GIRL</h1>

    <div class="results">
        <div class="card"><i>🔪</i><div class="origin" id="oriK">Killer</div><div class="val" id="resK">READY?</div></div>
        <div class="card"><i>🏚️</i><div class="origin" id="oriL">Location</div><div class="val" id="resL">READY?</div></div>
        <div class="card"><i>🩸</i><div class="origin" id="oriG">Final Girl</div><div class="val" id="resG">READY?</div></div>
    </div>

    <button id="roll-btn">GENERATE SCENARIO</button>

    <div class="global-controls">
        <button class="btn-sm" onclick="globalSelect(true)">SELECT ALL CONTENT</button>
        <button class="btn-sm" onclick="globalSelect(false)">DESELECT ALL</button>
        <button class="btn-sm" onclick="globalExpand(true)">EXPAND ALL</button>
        <button class="btn-sm" onclick="globalExpand(false)">COLLAPSE ALL</button>
    </div>

    <div id="dynamic-sections">
        <!-- Film categories will load here -->
    </div>
</div>

<script>
    let filmData = {};
    // Load state from local storage or set empty defaults
    let state = JSON.parse(localStorage.getItem('fg_simple_state')) || { owned: [] };

    async function init() {
        try {
            const res = await fetch('data.json');
            filmData = await res.json();
            render();
        } catch (e) {
            console.error("Data load failed. Ensure you're using a local server.");
        }
    }

    function render() {
        const container = document.getElementById('dynamic-sections');
        container.innerHTML = '';

        Object.keys(filmData).forEach(series => {
            const det = document.createElement('details');
            det.open = true;
            
            det.innerHTML = `
                <summary>
                    <div class="summary-content">
                        <span>${series}</span>
                        <div>
                            <button class="btn-sm" onclick="event.stopPropagation(); toggleSeries('${series}', true)">ALL</button>
                            <button class="btn-sm" onclick="event.stopPropagation(); toggleSeries('${series}', false)">NONE</button>
                        </div>
                    </div>
                </summary>
                <div class="grid">
                    ${filmData[series].map(f => `
                        <label class="item">
                            <input type="checkbox" ${state.owned.includes(f.id) ? 'checked' : ''} 
                            onchange="toggleFilm('${f.id}', this.checked)"> ${f.name}
                        </label>
                    `).join('')}
                </div>`;
            container.appendChild(det);
        });
    }

    function toggleFilm(id, isOwned) {
        if(isOwned) state.owned.push(id);
        else state.owned = state.owned.filter(fid => fid !== id);
        save();
    }

    function toggleSeries(series, val) {
        filmData[series].forEach(f => {
            state.owned = state.owned.filter(fid => fid !== f.id);
            if(val) state.owned.push(f.id);
        });
        save();
        render();
    }

    function globalSelect(val) {
        state.owned = [];
        if(val) {
            Object.values(filmData).flat().forEach(f => state.owned.push(f.id));
        }
        save();
        render();
    }

    function globalExpand(val) {
        document.querySelectorAll('details').forEach(d => d.open = val);
    }

    function save() {
        localStorage.setItem('fg_simple_state', JSON.stringify(state));
    }

    function roll() {
        let pool = { killers: [], locations: [], girls: [] };

        // Gather all items from owned films
        Object.values(filmData).flat().forEach(f => {
            if(state.owned.includes(f.id)) {
                f.killers.forEach(name => pool.killers.push({ n: name, f: f.name }));
                f.locations.forEach(name => pool.locations.push({ n: name, f: f.name }));
                f.girls.forEach(name => pool.girls.push({ n: name, f: f.name }));
            }
        });

        const pick = (arr) => arr.length ? arr[Math.floor(Math.random() * arr.length)] : { n: "---", f: "No Selection" };
        
        const k = pick(pool.killers);
        const l = pick(pool.locations);
        const g = pick(pool.girls);

        // Update UI
        document.getElementById('resK').innerText = k.n;
        document.getElementById('oriK').innerText = "🎬 " + k.f;
        
        document.getElementById('resL').innerText = l.n;
        document.getElementById('oriL').innerText = "🎬 " + l.f;
        
        document.getElementById('resG').innerText = g.n;
        document.getElementById('oriG').innerText = "🎬 " + g.f;
    }

    document.getElementById('roll-btn').onclick = roll;
    init();
</script>
</body>
</html>
