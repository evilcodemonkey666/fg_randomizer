<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl: The Ultimate Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #8b0000;
            --bright-red: #ff4d4d;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-gray: #cccccc;
            --gold: #ffd700;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 900px; width: 100%; }

        h1 { 
            font-family: 'Nosifer', cursive; 
            color: var(--blood-red); 
            text-align: center; 
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px black;
        }

        .subtitle { text-align: center; color: var(--text-gray); margin-bottom: 30px; font-style: italic; }

        /* Results Display */
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-card {
            background: linear-gradient(145deg, #222, #111);
            border: 2px solid var(--blood-red);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover { transform: scale(1.02); }
        .result-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .result-label { color: var(--text-gray); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        .result-value { font-size: 1.6rem; font-weight: 900; margin: 10px 0; color: var(--bright-red); }
        .result-origin { font-size: 0.85rem; color: var(--gold); border-top: 1px solid #333; pt: 10px; margin-top: 10px; padding-top: 10px; }

        /* Controls */
        button#main-btn {
            background: var(--blood-red);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.4);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        button#main-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Expandable Sections */
        details {
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        summary {
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            background: #252525;
            list-style: none;
            display: flex;
            justify-content: space-between;
        }

        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 0.8rem; }

        .expansion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .film-checkbox {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            background: #111;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .film-checkbox input { margin-right: 10px; accent-color: var(--bright-red); }

        /* Custom Editor */
        .editor-input-group {
            display: flex;
            gap: 5px;
            padding: 15px;
        }

        input[type="text"], select {
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
        }

        .custom-list {
            padding: 0 15px 15px 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .custom-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 5px 0;
            border-bottom: 1px solid #222;
        }

        .delete-btn { color: var(--bright-red); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
