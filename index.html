<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FG Randomizer</title>
    <style>
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: black;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>FG Randomizer</h1>
    <div class="tooltip">Killers<span class="tooltiptext">Description of killers</span></div>
    <div class="tooltip">Locations<span class="tooltiptext">Description of locations</span></div>
    <div class="tooltip">Girls<span class="tooltiptext">Description of girls</span></div>
    <script>
        // Implementing a basic hover functionality to show tooltips
    </script>
</body>
</html>
