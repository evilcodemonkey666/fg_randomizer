<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8b0000; --bright: #ff4d4d; --bg: #0a0a0a; --card: #1a1a1a; --gold: #ffd700; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        h1 { font-family: 'Nosifer', cursive; color: var(--blood); text-align: center; margin: 10px 0; font-size: 2.5rem; }
        
        /* Result Display */
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); border: 2px solid var(--blood); border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .val { font-size: 1.5rem; font-weight: 900; color: var(--bright); margin: 5px 0; min-height: 1.8rem; transition: opacity 0.2s; }
        .origin { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* Buttons */
        #roll-btn { background: var(--blood); color: white; border: none; width: 100%; padding: 20px; font-size: 1.5rem; font-weight: 900; border-radius: 50px; cursor: pointer; margin-bottom: 30px; box-shadow: 0 0 15px rgba(139,0,0,0.5); transition: 0.2s; }
        #roll-btn:hover { background: var(--bright); transform: scale(1.02); }
        .sel-btn { background: #333; color: #ccc; border: 1px solid #444; padding: 4px 10px; font-size: 0.7rem; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        .sel-btn:hover { background: #444; color: white; }

        /* Sections */
        details { background: var(--card); border: 1px solid #333; margin-bottom: 10px; border-radius: 5px; }
        summary { padding: 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 15px; border-top: 1px solid #333; }
        .item { display: flex; align-items: center; font-size: 0.85rem; background: #111; padding: 8px; border-radius: 4px; cursor: pointer; }
        .item input { margin-right: 10px; accent-color: var(--bright); }

        /* Custom Section */
        .custom-row { display: flex; gap: 5px; padding: 15px; }
        input[type="text"], select { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>FINAL GIRL</h1>
    
    <div class="results">
        <div class="card"><i id="icon-k">🪓</i><div class="origin" id="oriK">Killer</div><div class="val" id="resK">???</div></div>
        <div class="card"><i id="icon-l">🏚️</i><div class="origin" id="oriL">Location</div><div class="val" id="resL">???</div></div>
        <div class="card"><i id="icon-g">🏃‍♀️</i><div class="origin" id="oriG">Final Girl</div><div class="val" id="resG">???</div></div>
    </div>

    <button id="roll-btn">ROLL FOR SURVIVAL</button>

    <div id="dynamic-sections">
        <!-- JSON content will load here -->
    </div>

    <details>
        <summary>MANAGE CUSTOM CONTENT</summary>
        <div class="custom-row">
            <input type="text" id="custName" placeholder="Name..." style="flex:2">
            <select id="custType">
                <option value="killers">Killer</option>
                <option value="locations">Location</option>
                <option value="girls">Girl</option>
            </select>
            <button onclick="addCustom()">ADD</button>
        </div>
        <div id="custDisplay" style="padding:0 15px 15px 15px; font-size: 0.8rem;"></div>
    </details>
</div>

<script>
    let filmData = {};
    let state = JSON.parse(localStorage.getItem('fg_v3_state')) || { owned: [], custom: { killers: [], locations: [], girls: [] } };

    async function loadData() {
        try {
            const response = await fetch('data.json');
            filmData = await response.json();
            renderUI();
        } catch (e) {
            alert("Error loading data.json. Make sure you are running this on a local server or uploading to a host.");
            console.error(e);
        }
    }

    function renderUI() {
        const container = document.getElementById('dynamic-sections');
        container.innerHTML = '';

        Object.keys(filmData).forEach(seriesName => {
            const det = document.createElement('details');
            det.open = true;
            
            const sum = document.createElement('summary');
            sum.innerHTML = `<span>${seriesName}</span>`;
            
            const btnGroup = document.createElement('div');
            const btnAll = document.createElement('button');
            btnAll.className = 'sel-btn';
            btnAll.innerText = 'SELECT ALL';
            btnAll.onclick = (e) => { e.preventDefault(); toggleSeries(seriesName, true); };
            
            const btnNone = document.createElement('button');
            btnNone.className = 'sel-btn';
            btnNone.innerText = 'NONE';
            btnNone.onclick = (e) => { e.preventDefault(); toggleSeries(seriesName, false); };

            btnGroup.append(btnAll, btnNone);
            sum.appendChild(btnGroup);
            
            const grid = document.createElement('div');
            grid.className = 'grid';

            filmData[seriesName].forEach(film => {
                const label = document.createElement('label');
                label.className = 'item';
                const checked = state.owned.includes(film.id) ? 'checked' : '';
                label.innerHTML = `<input type="checkbox" data-id="${film.id}" ${checked}> ${film.name}`;
                label.querySelector('input').onchange = (e) => {
                    if(e.target.checked) state.owned.push(film.id);
                    else state.owned = state.owned.filter(id => id !== film.id);
                    save();
                };
                grid.appendChild(label);
            });

            det.append(sum, grid);
            container.appendChild(det);
        });
        renderCustom();
    }

    function toggleSeries(seriesName, val) {
        filmData[seriesName].forEach(film => {
            state.owned = state.owned.filter(id => id !== film.id);
            if(val) state.owned.push(film.id);
        });
        save();
        renderUI(); // Refresh checkboxes
    }

    function addCustom() {
        const n = document.getElementById('custName').value;
        const t = document.getElementById('custType').value;
        if(n) { state.custom[t].push(n); save(); renderCustom(); document.getElementById('custName').value = ''; }
    }

    function renderCustom() {
        const d = document.getElementById('custDisplay');
        d.innerHTML = '';
        ['killers', 'locations', 'girls'].forEach(t => {
            state.custom[t].forEach((name, i) => {
                d.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${t.toUpperCase()}: ${name}</span>
                    <span style="color:red; cursor:pointer;" onclick="state.custom['${t}'].splice(${i},1); save(); renderCustom();">REMOVE</span>
                </div>`;
            });
        });
    }

    function save() { localStorage.setItem('fg_v3_state', JSON.stringify(state)); }

    function roll() {
        let pool = { killers: [], locations: [], girls: [] };
        
        // Add from JSON
        Object.values(filmData).flat().forEach(film => {
            if(state.owned.includes(film.id)) {
                film.killers.forEach(x => pool.killers.push({n: x, f: film.name}));
                film.locations.forEach(x => pool.locations.push({n: x, f: film.name}));
                film.girls.forEach(x => pool.girls.push({n: x, f: film.name}));
            }
        });

        // Add Custom
        ['killers', 'locations', 'girls'].forEach(t => {
            state.custom[t].forEach(x => pool[t].push({n: x, f: "Custom Content"}));
        });

        const pick = (arr) => arr.length ? arr[Math.floor(Math.random() * arr.length)] : {n: "---", f: "Check Filters"};
        
        const k = pick(pool.killers);
        const l = pick(pool.locations);
        const g = pick(pool.girls);

        document.getElementById('resK').innerText = k.n; document.getElementById('oriK').innerText = k.f;
        document.getElementById('resL').innerText = l.n; document.getElementById('oriL').innerText = l.f;
        document.getElementById('resG').innerText = g.n; document.getElementById('oriG').innerText = g.f;
    }

    document.getElementById('roll-btn').onclick = roll;
    loadData();
</script>
</body>
</html>
