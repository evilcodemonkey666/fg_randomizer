<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl Randomizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8b0000; --bright: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        h1 { font-family: 'Nosifer', cursive; color: var(--blood); text-align: center; margin: 20px 0; font-size: clamp(1.8rem, 5vw, 2.8rem); text-shadow: 3px 3px 0px #000; }

        /* Global Toolbar */
        .global-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-sm { background: #222; color: #aaa; border: 1px solid #444; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .btn-sm:hover { border-color: var(--bright); color: white; }

        /* Results */
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); border: 2px solid var(--blood); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--blood); }
        .card i { font-size: 2.2rem; display: block; margin-bottom: 10px; opacity: 0.8; }
        .val { font-size: 1.6rem; font-weight: 900; color: var(--bright); margin: 5px 0; transition: transform 0.2s; }
        .origin { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; font-weight: bold; opacity: 0.8; }

        /* Roll Button */
        #roll-btn { background: var(--blood); color: white; border: none; width: 100%; padding: 20px; font-size: 1.6rem; font-weight: 900; border-radius: 8px; cursor: pointer; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s; letter-spacing: 2px; }
        #roll-btn:hover { background: var(--bright); box-shadow: 0 0 20px var(--blood); }

        /* Accordion Style Sections */
        details { background: var(--card); border: 1px solid #222; margin-bottom: 8px; border-radius: 6px; }
        summary { padding: 15px; cursor: pointer; font-weight: 900; display: flex; align-items: center; background: #222; border-radius: 6px; }
        summary:hover { background: #2a2a2a; }
        .summary-content { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-left: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; padding: 15px; background: #111; border-top: 1px solid #333; }
        .item { display: flex; align-items: center; font-size: 0.85rem; background: #1a1a1a; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
        .item:hover { border-color: #444; }
        .item input { margin-right: 12px; transform: scale(1.2); accent-color: var(--bright); }

        /* Custom Content */
        .custom-area { padding: 15px; background: #111; border-radius: 0 0 6px 6px; }
        .custom-input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"], select { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; flex: 1; }
        .custom-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>FINAL GIRL</h1>

    <div class="results">
        <div class="card"><i id="icon-k">🔪</i><div class="origin" id="oriK">Killer</div><div class="val" id="resK">READY?</div></div>
        <div class="card"><i id="icon-l">🏚️</i><div class="origin" id="oriL">Location</div><div class="val" id="resL">READY?</div></div>
        <div class="card"><i id="icon-g">🩸</i><div class="origin" id="oriG">Final Girl</div><div class="val" id="resG">READY?</div></div>
    </div>

    <button id="roll-btn">GENERATE SCENARIO</button>

    <!-- Global Logic Controls -->
    <div class="global-controls">
        <button class="btn-sm" onclick="globalSelect(true)">SELECT ALL CONTENT</button>
        <button class="btn-sm" onclick="globalSelect(false)">DESELECT ALL</button>
        <button class="btn-sm" onclick="globalExpand(true)">EXPAND ALL</button>
        <button class="btn-sm" onclick="globalExpand(false)">COLLAPSE ALL</button>
    </div>

    <div id="dynamic-sections">
        <!-- Sections load here -->
    </div>

    <details id="custom-section">
        <summary><span class="summary-content"><span>MANAGE CUSTOM CONTENT</span></span></summary>
        <div class="custom-area">
            <div class="custom-input-group">
                <input type="text" id="custName" placeholder="Name (e.g. Jason Voorhees)">
                <select id="custType">
                    <option value="killers">Killer</option>
                    <option value="locations">Location</option>
                    <option value="girls">Final Girl</option>
                </select>
                <button class="btn-sm" style="background:var(--blood); color:white; border:none;" onclick="addCustom()">ADD</button>
            </div>
            <div id="custDisplay"></div>
        </div>
    </details>
</div>

<script>
    let filmData = {};
    let state = JSON.parse(localStorage.getItem('fg_final_state')) || { 
        owned: [], 
        custom: { killers: [], locations: [], girls: [] } 
    };

    async function init() {
        try {
            const res = await fetch('data.json');
            filmData = await res.json();
            render();
        } catch (e) {
            alert("Error: data.json not found. Run this on a server (VS Code Live Server) or upload to a host.");
        }
    }

    function render() {
        const container = document.getElementById('dynamic-sections');
        container.innerHTML = '';

        Object.keys(filmData).forEach(series => {
            const det = document.createElement('details');
            det.className = 'series-details';
            det.open = true;

            const sum = document.createElement('summary');
            sum.innerHTML = `
                <div class="summary-content">
                    <span>${series}</span>
                    <div>
                        <button class="btn-sm" onclick="event.stopPropagation(); toggleSeries('${series}', true)">ALL</button>
                        <button class="btn-sm" onclick="event.stopPropagation(); toggleSeries('${series}', false)">NONE</button>
                    </div>
                </div>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid';

            filmData[series].forEach(film => {
                const label = document.createElement('label');
                label.className = 'item';
                const checked = state.owned.includes(film.id) ? 'checked' : '';
                label.innerHTML = `<input type="checkbox" ${checked} onchange="toggleFilm('${film.id}', this.checked)"> ${film.name}`;
                grid.appendChild(label);
            });

            det.append(sum, grid);
            container.appendChild(det);
        });
        renderCustom();
    }

    function toggleFilm(id, isOwned) {
        if(isOwned) state.owned.push(id);
        else state.owned = state.owned.filter(fid => fid !== id);
        save();
    }

    function toggleSeries(series, val) {
        filmData[series].forEach(f => {
            state.owned = state.owned.filter(fid => fid !== f.id);
            if(val) state.owned.push(f.id);
        });
        save(); render();
    }

    function globalSelect(val) {
        state.owned = [];
        if(val) {
            Object.values(filmData).flat().forEach(f => state.owned.push(f.id));
        }
        save(); render();
    }

    function globalExpand(val) {
        document.querySelectorAll('details').forEach(d => d.open = val);
    }

    function addCustom() {
        const n = document.getElementById('custName').value.trim();
        const t = document.getElementById('custType').value;
        if(n) { state.custom[t].push(n); save(); renderCustom(); document.getElementById('custName').value = ''; }
    }

    function renderCustom() {
        const d = document.getElementById('custDisplay');
        d.innerHTML = '';
        ['killers', 'locations', 'girls'].forEach(t => {
            state.custom[t].forEach((name, i) => {
                d.innerHTML += `<div class="custom-item">
                    <span><strong style="color:var(--bright)">${t.slice(0,-1).toUpperCase()}:</strong> ${name}</span>
                    <button class="btn-sm" style="color:red; border-color:red" onclick="state.custom['${t}'].splice(${i},1); save(); renderCustom();">DEL</button>
                </div>`;
            });
        });
    }

    function roll() {
        let pool = { killers: [], locations: [], girls: [] };
        Object.values(filmData).flat().forEach(f => {
            if(state.owned.includes(f.id)) {
                f.killers.forEach(x => pool.killers.push({n: x, f: f.name}));
                f.locations.forEach(x => pool.locations.push({n: x, f: f.name}));
                f.girls.forEach(x => pool.girls.push({n: x, f: f.name}));
            }
        });
        ['killers', 'locations', 'girls'].forEach(t => {
            state.custom[t].forEach(x => pool[t].push({n: x, f: "Custom Entry"}));
        });

        const pick = (arr) => arr.length ? arr[Math.floor(Math.random() * arr.length)] : {n: "---", f: "No Data Selected"};
        
        const k = pick(pool.killers); const l = pick(pool.locations); const g = pick(pool.girls);

        // UI Update with small animation
        const update = (idVal, idOri, obj) => {
            const v = document.getElementById(idVal);
            v.style.transform = "scale(1.1)";
            v.innerText = obj.n;
            document.getElementById(idOri).innerText = "🎬 " + obj.f;
            setTimeout(() => v.style.transform = "scale(1)", 150);
        };
        update('resK', 'oriK', k); update('resL', 'oriL', l); update('resG', 'oriG', g);
    }

    function save() { localStorage.setItem('fg_final_state', JSON.stringify(state)); }
    document.getElementById('roll-btn').onclick = roll;
    init();
</script>
</body>
</html>
